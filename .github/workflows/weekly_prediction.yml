name: Weekly F1 Fantasy Prediction

on:
  schedule:
    # Every Thursday at 08:00 UTC — before the typical race weekend deadline
    - cron: "0 8 * * 4"
    # Every Sunday at 06:00 UTC — after qualifying, before race deadline
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      season:
        description: "F1 season year"
        required: false
        default: "2026"
      skip_scraper:
        description: "Skip price scraper (use hardcoded prices)"
        required: false
        type: boolean
        default: false
      skip_train:
        description: "Skip model training (reuse existing model)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  SEASON: ${{ github.event.inputs.season || '2026' }}
  PYTHON_VERSION: "3.11"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Job 1: Fetch race data from FastF1 + scrape fantasy prices
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

jobs:
  data:
    name: 📡 Fetch Data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache FastF1 data
        uses: actions/cache@v4
        with:
          path: fastf1_cache
          key: fastf1-cache-${{ env.SEASON }}-${{ github.run_number }}
          restore-keys: |
            fastf1-cache-${{ env.SEASON }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        if: github.event_name != 'schedule'
        run: playwright install --with-deps chromium

      - name: Fetch latest race data
        run: python src/data/fetch_fastf1.py --season ${{ env.SEASON }}

      - name: Scrape fantasy prices
        if: >-
          github.event_name != 'schedule'
          && github.event.inputs.skip_scraper != 'true'
        env:
          F1_FANTASY_EMAIL: ${{ secrets.F1_FANTASY_EMAIL }}
          F1_FANTASY_PASSWORD: ${{ secrets.F1_FANTASY_PASSWORD }}
        run: |
          if [ -z "$F1_FANTASY_EMAIL" ] || [ -z "$F1_FANTASY_PASSWORD" ]; then
            echo "::warning::F1 Fantasy credentials not set — skipping price scraper"
            exit 0
          fi
          python src/data/scrape_prices.py

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data
          path: data/f1_fantasy.duckdb
          retention-days: 1

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-screenshots
          path: data/scraper_debug*.png
          retention-days: 14
          if-no-files-found: ignore

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  Job 2: Engineer features + train LightGBM model
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  train:
    name: 🧠 Train Model
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: data

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download data artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-data
          path: .

      - name: Engineer features
        run: python src/features/engineer.py

      - name: Train model
        if: github.event.inputs.skip_train != 'true'
        run: python src/models/train.py

      - name: Upload train artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-train
          path: |
            data/f1_fantasy.duckdb
            data/processed/features.parquet
            models/lgbm_predictor.pkl
          retention-days: 1

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  Job 3: Generate predictions, optimise team, build report
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  predict:
    name: 🏎️ Predict & Optimise
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: train

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache FastF1 data
        uses: actions/cache@v4
        with:
          path: fastf1_cache
          key: fastf1-cache-${{ env.SEASON }}-${{ github.run_number }}
          restore-keys: |
            fastf1-cache-${{ env.SEASON }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download train artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-train
          path: .

      - name: Generate predictions
        run: python src/models/predict.py --season ${{ env.SEASON }}

      - name: Run team optimiser
        run: python src/optimiser/team_selector.py

      - name: Generate report
        run: python src/report/generate.py

      - name: Write report to Job Summary
        if: always()
        run: |
          if [ -f reports/latest.md ]; then
            cat reports/latest.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Report not generated" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for errors." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload predict artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-predict
          path: |
            reports/
            data/processed/predictions_*.parquet
            models/lgbm_predictor.pkl
          retention-days: 1

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: f1-fantasy-report-${{ env.SEASON }}
          path: |
            reports/*.md
            data/processed/predictions_*.parquet
          retention-days: 90

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  Job 4: Commit report + updated data back to repo
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  publish:
    name: 📤 Publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: predict

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download predict artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-predict
          path: .

      - name: Commit and push report
        run: |
          git config --global user.name "f1-fantasy-bot"
          git config --global user.email "bot@f1fantasy"
          git add reports/ data/processed/ models/lgbm_predictor.pkl
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          RACE_NAME=$(head -1 reports/latest.md | sed 's/# 🏎️ F1 Fantasy Prediction — //' | sed 's/ 🌧️//')
          git commit -m "🏎️ Auto: ${RACE_NAME} — $(date +'%Y-%m-%d')"
          git push
